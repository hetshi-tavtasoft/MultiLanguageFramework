name: JavaScript Playwright Tests
on:
  push:
    branches: [ main, master ]
    paths:
      - 'frameworks/js-playwright/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frameworks/js-playwright/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - uat
      headed:
        description: 'Run in headed mode'
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: ${{ github.event.inputs.environment || 'qa' }}
      BASE_URL: ${{ secrets.BASE_URL }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: frameworks/js-playwright/package-lock.json
    - name: Install dependencies
      working-directory: frameworks/js-playwright
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: frameworks/js-playwright
      run: npx playwright install --with-deps ${{ matrix.browser }}
    - name: Run Playwright tests
      working-directory: frameworks/js-playwright
      run: |
        if [ "${{ github.event.inputs.headed }}" = "true" ]; then
          npx playwright test --project=${{ matrix.browser }} --headed
        else
          npx playwright test --project=${{ matrix.browser }}
        fi
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-js-${{ matrix.browser }}
        path: frameworks/js-playwright/playwright-report/
        retention-days: 30
