name: JS Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  js-tests:
    name: JS Playwright Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frameworks/js-playwright

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        with:
          name: js-report
          path: frameworks/js-playwright/playwright-report/
