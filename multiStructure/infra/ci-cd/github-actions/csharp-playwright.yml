name: C# Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  csharp-tests:
    name: C# Playwright Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frameworks/csharp-playwright/PlaywrightCSharp

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build

      - name: Install Playwright
        run: |
          pwsh bin/Debug/net8.0/playwright.ps1 install

      - name: Run Tests
        run: dotnet test

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: csharp-report
          path: frameworks/csharp-playwright/PlaywrightCSharp/TestResults/
