name: TypeScript Playwright Tests
on:
  push:
    branches: [ main, master ]
    paths:
      - 'frameworks/ts-playwright/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frameworks/ts-playwright/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - uat
      shard:
        description: 'Shard number (e.g., 1/3)'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: ${{ github.event.inputs.environment || 'qa' }}
      BASE_URL: ${{ secrets.BASE_URL }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: frameworks/ts-playwright/package-lock.json
    - name: Install dependencies
      working-directory: frameworks/ts-playwright
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: frameworks/ts-playwright
      run: npx playwright install --with-deps ${{ matrix.browser }}
    - name: Run Playwright tests
      working-directory: frameworks/ts-playwright
      run: npx playwright test --project=${{ matrix.browser }} ${{ github.event.inputs.shard && format('--shard={0}', github.event.inputs.shard) || '' }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ts-${{ matrix.browser }}
        path: frameworks/ts-playwright/playwright-report/
        retention-days: 30
