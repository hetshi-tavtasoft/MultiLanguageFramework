stages:
  - test

variables:
  NODE_VERSION: "18"
  DOTNET_VERSION: "8.0"

cache:
  key:
    files:
      - frameworks/ts-playwright/package-lock.json
      - frameworks/js-playwright/package-lock.json
  paths:
    - .npm/

ts-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.0-jammy
  script:
    - cd frameworks/ts-playwright
    - npm ci
    - npx playwright install --with-deps
    - npx playwright test
  artifacts:
    when: always
    paths:
      - frameworks/ts-playwright/playwright-report/
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

js-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.0-jammy
  script:
    - cd frameworks/js-playwright
    - npm ci
    - npx playwright install --with-deps
    - npx playwright test
  artifacts:
    when: always
    paths:
      - frameworks/js-playwright/playwright-report/
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

csharp-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.0-jammy
  script:
    - cd frameworks/csharp-playwright/PlaywrightCSharp
    - dotnet restore
    - dotnet build
    - pwsh bin/Debug/net8.0/playwright.ps1 install
    - dotnet test
  artifacts:
    when: always
    paths:
      - frameworks/csharp-playwright/PlaywrightCSharp/TestResults/
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
