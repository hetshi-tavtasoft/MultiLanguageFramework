trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '18.x'
  DOTNET_VERSION: '8.x'

jobs:
  - job: TSTests
    displayName: 'TS Playwright Tests'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '$(NODE_VERSION)'
      displayName: 'Setup Node'

    - script: |
        cd frameworks/ts-playwright
        npm ci
        npx playwright install --with-deps
      displayName: 'Install Dependencies'

    - script: |
        cd frameworks/ts-playwright
        npx playwright test
      displayName: 'Run Tests'

    - task: PublishBuildArtifacts@1
      condition: always()
      inputs:
        pathToPublish: 'frameworks/ts-playwright/playwright-report'
        artifactName: 'ts-report'

  - job: JSTests
    displayName: 'JS Playwright Tests'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '$(NODE_VERSION)'
      displayName: 'Setup Node'

    - script: |
        cd frameworks/js-playwright
        npm ci
        npx playwright install --with-deps
      displayName: 'Install Dependencies'

    - script: |
        cd frameworks/js-playwright
        npx playwright test
      displayName: 'Run Tests'

    - task: PublishBuildArtifacts@1
      condition: always()
      inputs:
        pathToPublish: 'frameworks/js-playwright/playwright-report'
        artifactName: 'js-report'

  - job: CSharpTests
    displayName: 'C# Playwright Tests'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '$(DOTNET_VERSION)'
      displayName: 'Setup .NET'

    - script: |
        cd frameworks/csharp-playwright/PlaywrightCSharp
        dotnet restore
        dotnet build
      displayName: 'Restore and Build'

    - script: |
        cd frameworks/csharp-playwright/PlaywrightCSharp
        pwsh bin/Debug/net8.0/playwright.ps1 install
      displayName: 'Install Playwright'

    - script: |
        cd frameworks/csharp-playwright/PlaywrightCSharp
        dotnet test
      displayName: 'Run Tests'

    - task: PublishBuildArtifacts@1
      condition: always()
      inputs:
        pathToPublish: 'frameworks/csharp-playwright/PlaywrightCSharp/TestResults'
        artifactName: 'csharp-report'
