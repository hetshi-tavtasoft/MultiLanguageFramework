name: Run All Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (qa/uat/prod)'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - uat
          - prod
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
env:
  ENV: ${{ github.event.inputs.environment || 'qa' }}

jobs:
  run-all:
    name: Run All Framework Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJSON(github.event.inputs.browser == 'all' && '["chromium", "firefox", "webkit"]' || format('["{0}"]', github.event.inputs.browser || 'chromium')) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install JS Dependencies
        working-directory: multiStructure/frameworks/js-playwright
        run: npm ci

      - name: Install TS Dependencies
        working-directory: multiStructure/frameworks/ts-playwright
        run: npm ci

      - name: Install Allure Commandline
        run: npm install -g allure-commandline@2.27.0

      - name: Install Playwright Browsers (JS)
        working-directory: multiStructure/frameworks/js-playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright Browsers (TS)
        working-directory: multiStructure/frameworks/ts-playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Restore .NET Dependencies
        working-directory: multiStructure/frameworks/csharp-playwright
        run: dotnet restore

      - name: Build C# Project
        working-directory: multiStructure/frameworks/csharp-playwright
        run: dotnet build

      - name: Install Playwright (C#)
        working-directory: multiStructure/frameworks/csharp-playwright
        run: pwsh bin/Debug/net8.0/playwright.ps1 install ${{ matrix.browser }}

      - name: Run JS Tests
        working-directory: multiStructure/frameworks/js-playwright
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Run TS Tests
        working-directory: multiStructure/frameworks/ts-playwright
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Run C# Tests
        working-directory: multiStructure/frameworks/csharp-playwright
        run: dotnet test --filter "BrowserName=${{ matrix.browser }}"
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Generate Allure Results (JS)
        if: always()
        working-directory: multiStructure/frameworks/js-playwright
        run: |
          mkdir -p allure-results
          [ -d "allure-results" ] && echo "Allure results directory ready"

      - name: Generate Allure Results (TS)
        if: always()
        working-directory: multiStructure/frameworks/ts-playwright
        run: |
          mkdir -p allure-results
          [ -d "allure-results" ] && echo "Allure results directory ready"

      - name: Generate Allure Results (C#)
        if: always()
        working-directory: multiStructure/frameworks/csharp-playwright
        run: |
          mkdir -p allure-results
          [ -d "allure-results" ] && echo "Allure results directory ready"

      - name: Upload JS Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-allure-results-${{ matrix.browser }}
          path: multiStructure/frameworks/js-playwright/allure-results/

      - name: Upload TS Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-allure-results-${{ matrix.browser }}
          path: multiStructure/frameworks/ts-playwright/allure-results/

      - name: Upload C# Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: csharp-allure-results-${{ matrix.browser }}
          path: multiStructure/frameworks/csharp-playwright/allure-results/

      - name: Upload JS Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-playwright-report-${{ matrix.browser }}
          path: multiStructure/frameworks/js-playwright/playwright-report/

      - name: Upload TS Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-playwright-report-${{ matrix.browser }}
          path: multiStructure/frameworks/ts-playwright/playwright-report/

      - name: Upload C# Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: csharp-test-results-${{ matrix.browser }}
          path: multiStructure/frameworks/csharp-playwright/TestResults/

  allure-report:
    name: Generate Allure Report
    needs: run-all
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Allure Commandline
        run: npm install -g allure-commandline@2.27.0

      - name: Download JS Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: js-allure-results-*
          path: allure-results-js
          merge-multiple: true

      - name: Download TS Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: ts-allure-results-*
          path: allure-results-ts
          merge-multiple: true

      - name: Download C# Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: csharp-allure-results-*
          path: allure-results-csharp
          merge-multiple: true

      - name: Combine All Allure Results
        run: |
          mkdir -p allure-results
          cp -r allure-results-js/* allure-results/ 2>/dev/null || true
          cp -r allure-results-ts/* allure-results/ 2>/dev/null || true
          cp -r allure-results-csharp/* allure-results/ 2>/dev/null || true

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

  notify:
    name: Notify Results
    needs: [run-all, allure-report]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success Notification
        if: ${{ success() }}
        run: echo "✅ All Playwright tests passed! Allure report generated."

      - name: Failure Notification
        if: ${{ failure() }}
        run: echo "❌ Some Playwright tests failed. Check artifacts for details."
