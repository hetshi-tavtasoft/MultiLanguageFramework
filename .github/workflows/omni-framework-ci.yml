name: Omni-Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (qa/uat/prod)'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - uat
          - prod

env:
  ENV: ${{ github.event.inputs.environment || 'qa' }}

jobs:
  test:
    name: ${{ matrix.language }} Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [js, ts, csharp]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.language != 'csharp'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Dependencies
        working-directory: multiStructure/frameworks/${{ matrix.language }}-playwright
        run: |
          if [ "${{ matrix.language }}" = "csharp" ]; then
            dotnet restore
          else
            npm ci
          fi

      - name: Install Playwright Browsers
        working-directory: multiStructure/frameworks/${{ matrix.language }}-playwright
        run: |
          if [ "${{ matrix.language }}" = "csharp" ]; then
            dotnet build
            pwsh bin/Debug/net8.0/playwright.ps1 install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run Tests
        working-directory: multiStructure/frameworks/${{ matrix.language }}-playwright
        run: |
          if [ "${{ matrix.language }}" = "csharp" ]; then
            dotnet test --filter "FullyQualifiedName~NavigateAndVerifySwagLabsDashboard"
          elif [ "${{ matrix.language }}" = "js" ]; then
            npx playwright test tests/e2eTest.spec.js --project=chromium
          else
            npx playwright test tests/login.spec.ts --project=chromium
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Generate Allure Results (JS/TS)
        if: matrix.language != 'csharp'
        working-directory: multiStructure/frameworks/${{ matrix.language }}-playwright
        run: |
          mkdir -p allure-results
          [ -d "allure-results" ] && echo "Allure results directory ready"

      - name: Generate Allure Results (C#)
        if: matrix.language == 'csharp'
        working-directory: multiStructure/frameworks/${{ matrix.language }}-playwright
        run: |
          mkdir -p allure-results
          echo "Allure results directory created"
          ls -la allure-results/ 2>/dev/null || echo "No allure results generated"
        continue-on-error: true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.language }}-allure-results
          path: multiStructure/frameworks/${{ matrix.language }}-playwright/allure-results/

  allure-report:
    name: Generate Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Allure
        run: npm install -g allure-commandline@2.27.0

      - name: Download JS Allure Results
        uses: actions/download-artifact@v4
        with:
          name: js-allure-results
          path: allure-results-js

      - name: Download TS Allure Results
        uses: actions/download-artifact@v4
        with:
          name: ts-allure-results
          path: allure-results-ts

      - name: Download C# Allure Results
        uses: actions/download-artifact@v4
        with:
          name: csharp-allure-results
          path: allure-results-csharp

      - name: Combine Allure Results
        run: |
          mkdir -p allure-results
          cp -r allure-results-js/* allure-results/ 2>/dev/null || true
          cp -r allure-results-ts/* allure-results/ 2>/dev/null || true
          cp -r allure-results-csharp/* allure-results/ 2>/dev/null || true

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
