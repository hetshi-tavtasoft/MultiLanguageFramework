name: Playwright Simple Test

on:
  workflow_dispatch:

jobs:
  simple-test:
    name: Simple JS Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multiStructure/frameworks/js-playwright
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
